<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vocasign</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Background como elemento para controle total */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* Logo centralizada, fundo removido via mix-blend-mode */
    .logo {
      position: relative;
      z-index: 1;
      width: clamp(140px, 16vw, 300px);
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>

  <div class="bg">
    <img src="background.jpg" alt=""/>
  </div>

  <img src="logo.png" class="logo" alt="Vocasign"/>

</body>
</html>
