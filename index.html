<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vocasign</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* ── Fundo cinza médio ── */
    .bg {
      position: fixed;
      inset: 0;
      background-color: #6e6e6e;
    }

    /* ── Blobs escuros nos cantos ── */
    .blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .blob-bl {
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(30,30,30,0.55) 0%, transparent 70%);
      bottom: -180px; left: -100px;
    }
    .blob-tr {
      width: 500px; height: 500px;
      background: radial-gradient(ellipse, rgba(30,30,30,0.45) 0%, transparent 70%);
      top: -120px; right: -80px;
    }
    .blob-br {
      width: 420px; height: 360px;
      background: radial-gradient(ellipse, rgba(30,30,30,0.38) 0%, transparent 70%);
      bottom: -80px; right: 60px;
    }

    /* ── Grid fino ── */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    /* ── Grain sutil ── */
    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ── Conteúdo sobre o fundo ── */
    .content {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Cruz central ── */
    .cross {
      position: relative;
      width: 70vw;
      max-width: 900px;
    }

    /* Linha horizontal */
    .cross::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: rgba(255,255,255,0.35);
    }

    /* Linha vertical */
    .cross::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 1px;
      background: rgba(255,255,255,0.35);
    }

    /* ── Quadrantes ── */
    .quadrants {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      width: 70vw;
      max-width: 900px;
      height: 220px;
    }

    /* Superior esquerdo — vazio */
    .q-tl { }

    /* Superior direito — "vocasign" */
    .q-tr {
      display: flex;
      align-items: flex-end;
      padding-bottom: 18px;
      padding-left: 28px;
    }

    .brand {
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    /* Inferior esquerdo — "em breve" */
    .q-bl {
      display: flex;
      align-items: flex-start;
      padding-top: 22px;
      justify-content: flex-end;
      padding-right: 28px;
    }

    .em-breve {
      font-size: 14px;
      font-weight: 300;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.01em;
    }

    /* Inferior direito — taglines */
    .q-br {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 22px;
      padding-left: 28px;
      gap: 6px;
    }

    .tagline {
      font-size: 14px;
      font-weight: 300;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
    }

    .tagline strong {
      font-weight: 700;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <!-- Fundo -->
  <div class="bg">
    <div class="blob blob-bl"></div>
    <div class="blob blob-tr"></div>
    <div class="blob blob-br"></div>
    <div class="grid"></div>
    <div class="grain"></div>
  </div>

  <!-- Conteúdo -->
  <div class="content">
    <div style="position:relative;">

      <!-- Linha horizontal -->
      <div style="position:absolute; top:50%; left:0; right:0; height:1px; background:rgba(255,255,255,0.3);"></div>
      <!-- Linha vertical -->
      <div style="position:absolute; left:50%; top:0; bottom:0; width:1px; background:rgba(255,255,255,0.3);"></div>

      <div class="quadrants">

        <!-- Superior esquerdo: vazio -->
        <div class="q-tl"></div>

        <!-- Superior direito: vocasign -->
        <div class="q-tr">
          <h1 class="brand">vocasign</h1>
        </div>

        <!-- Inferior esquerdo: em breve -->
        <div class="q-bl">
          <span class="em-breve">em breve</span>
        </div>

        <!-- Inferior direito: taglines -->
        <div class="q-br">
          <p class="tagline">para a cidade, <strong>o edificios que fazem sentido.</strong></p>
          <p class="tagline">para o investidor, <strong>o produto certo, no lugar certo.</strong></p>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
