<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Em breve</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .bg {
      width: 100%;
      height: 100vh;
      background-color: #8fb8e8;
      position: relative;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
    }

    .b1 {
      width: 900px;
      height: 750px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.72) 0%, transparent 70%);
      top: -300px;
      right: -150px;
      animation: m1 18s ease-in-out infinite;
    }

    .b2 {
      width: 800px;
      height: 680px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.60) 0%, transparent 65%);
      bottom: -260px;
      left: -120px;
      animation: m2 22s ease-in-out infinite;
    }

    .b3 {
      width: 620px;
      height: 560px;
      background: radial-gradient(ellipse, rgba(210,230,252,0.55) 0%, transparent 70%);
      top: 60px;
      left: 160px;
      animation: m3 16s ease-in-out infinite;
    }

    .b4 {
      width: 520px;
      height: 460px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.45) 0%, transparent 70%);
      bottom: 20px;
      right: 100px;
      animation: m4 20s ease-in-out infinite;
    }

    @keyframes m1 {
      0%,  100% { transform: translate(0px,   0px)   scale(1);    }
      40%        { transform: translate(-80px, 70px)  scale(1.06); }
      70%        { transform: translate(-30px, 30px)  scale(0.97); }
    }

    @keyframes m2 {
      0%,  100% { transform: translate(0px,    0px)   scale(1);    }
      35%        { transform: translate(90px,  -60px) scale(1.08); }
      65%        { transform: translate(40px,  -20px) scale(0.95); }
    }

    @keyframes m3 {
      0%,  100% { transform: translate(0px,  0px);  }
      50%        { transform: translate(60px, 50px); }
    }

    @keyframes m4 {
      0%,  100% { transform: translate(0px,   0px);  }
      50%        { transform: translate(-70px,-50px); }
    }

    /* Grain sutil */
    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
    <div class="grain"></div>
  </div>

</body>
</html>
